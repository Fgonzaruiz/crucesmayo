<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cruces de Mayo 2026 – Córdoba</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --crimson: #7A0C0C;
      --rose: #B5261F;
      --gold: #C9920A;
      --gold-light: #E8B84B;
      --gold-pale: #F5D88A;
      --cream: #FDF6EC;
      --parchment: #F0DEB8;
      --dark: #120505;
      --darker: #0A0202;
      --sidebar-w: 340px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--darker);
      color: var(--cream);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    header {
      background: linear-gradient(100deg, #5C0808 0%, #3A0404 50%, #1A0202 100%);
      border-bottom: 1.5px solid var(--gold);
      padding: 0 22px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 1000;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 15% 50%, rgba(200,146,10,0.1) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 50%, rgba(200,146,10,0.07) 0%, transparent 55%);
      pointer-events: none;
    }
    .hbrand { display:flex; align-items:center; gap:13px; z-index:1; }
    .hcross { width:36px; height:36px; flex-shrink:0; }
    .hcross svg { width:100%; height:100%; filter:drop-shadow(0 0 5px rgba(200,146,10,.55)); }
    .htitle h1 {
      font-family:'Cinzel',serif; font-size:1.45rem; font-weight:700;
      color:var(--gold-light); letter-spacing:.05em; line-height:1;
    }
    .htitle p {
      font-family:'Cormorant Garamond',serif; font-style:italic;
      font-size:.82rem; color:var(--parchment); opacity:.8; margin-top:1px;
    }
    .hinfo { z-index:1; text-align:right; }
    .hinfo .city { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.14em; color:var(--gold); display:block; }
    .hinfo .dates { font-family:'Playfair Display',serif; font-size:1rem; color:var(--cream); display:block; }

    /* LAYOUT */
    .app { flex:1; display:flex; overflow:hidden; position:relative; }

    /* SIDEBAR */
    .sidebar {
      width:var(--sidebar-w);
      background:linear-gradient(180deg,#180606 0%,#0E0303 100%);
      border-right:1px solid rgba(200,146,10,.25);
      display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
    }
    .sw { padding:13px 14px 10px; background:rgba(122,12,12,.2); border-bottom:1px solid rgba(200,146,10,.18); flex-shrink:0; }
    .slbl { font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.14em; color:var(--gold); text-transform:uppercase; display:block; margin-bottom:7px; }
    .si { position:relative; }
    .si svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--gold); opacity:.6; pointer-events:none; }
    #q {
      width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(200,146,10,.3);
      border-radius:5px; padding:7px 10px 7px 30px; color:var(--cream);
      font-family:'Cormorant Garamond',serif; font-size:.93rem; outline:none;
      transition:border-color .2s, background .2s;
    }
    #q::placeholder { color:rgba(240,222,184,.3); }
    #q:focus { border-color:var(--gold); background:rgba(255,255,255,.08); }
    .filters { display:flex; gap:5px; margin-top:8px; }
    .fb {
      flex:1; padding:4px 0; border-radius:4px; border:1px solid rgba(200,146,10,.25);
      background:transparent; color:rgba(240,222,184,.55); font-family:'Cinzel',serif;
      font-size:.52rem; letter-spacing:.06em; cursor:pointer; transition:all .2s;
    }
    .fb:hover, .fb.on { background:var(--crimson); border-color:var(--gold); color:var(--gold-light); }
    .cnt { font-size:.7rem; color:var(--gold); opacity:.6; margin-top:5px; text-align:right; font-style:italic; }

    /* LIST */
    .list { flex:1; overflow-y:auto; padding:6px 7px; }
    .list::-webkit-scrollbar { width:3px; }
    .list::-webkit-scrollbar-thumb { background:rgba(200,146,10,.25); border-radius:2px; }
    .item {
      display:flex; align-items:center; gap:9px; padding:7px 9px;
      border-radius:5px; cursor:pointer; border:1px solid transparent;
      margin-bottom:2px; transition:background .18s, transform .12s, border-color .18s;
      animation:slideIn .2s ease backwards;
    }
    .item:hover { background:rgba(122,12,12,.35); border-color:rgba(200,146,10,.18); transform:translateX(2px); }
    .item.active { background:rgba(122,12,12,.6); border-color:rgba(200,146,10,.45); }
    .item.gone { display:none; }
    .num {
      width:25px; height:25px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:.6rem; font-weight:700; flex-shrink:0; border:1.5px solid;
    }
    .zh .num { background:rgba(25,70,190,.2);  border-color:#4F7EE0; color:#9DC0FF; }
    .zm .num { background:rgba(20,150,70,.2);  border-color:#47C07A; color:#8FEFBB; }
    .zc .num { background:rgba(200,115,20,.2); border-color:#D97E2A; color:#FFCA6F; }
    .iname { font-size:.84rem; color:var(--cream); line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .itag  { font-size:.58rem; font-style:italic; margin-top:1px; opacity:.55; }
    .zh .itag { color:#9DC0FF; }
    .zm .itag { color:#8FEFBB; }
    .zc .itag { color:#FFCA6F; }

    /* MAP */
    #map { flex:1; z-index:1; }
    .leaflet-container { background:#120505; }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background:linear-gradient(145deg,#1E0707 0%,#100303 100%) !important;
      border:1px solid var(--gold) !important;
      border-radius:10px !important;
      box-shadow:0 12px 40px rgba(0,0,0,.75),0 0 0 1px rgba(200,146,10,.15) !important;
      padding:0 !important;
      min-width:260px; max-width:300px;
    }
    .leaflet-popup-content { margin:0 !important; width:auto !important; color:var(--cream); }
    .leaflet-popup-tip { background:#1E0707 !important; }
    .leaflet-popup-close-button { color:var(--gold) !important; top:7px !important; right:9px !important; font-size:18px !important; }
    .leaflet-control-zoom a { background:rgba(20,5,5,.88) !important; color:var(--gold-light) !important; border-color:rgba(200,146,10,.3) !important; }

    .pp { padding:16px 18px 14px; }
    .pph { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid rgba(200,146,10,.2); }
    .ppi {
      width:34px; height:34px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
      border-radius:50%; border:1.5px solid; font-family:'Cinzel',serif; font-weight:700; font-size:.65rem;
    }
    .pih { background:rgba(25,70,190,.18); border-color:#4F7EE0; color:#9DC0FF; }
    .pim { background:rgba(20,150,70,.18);  border-color:#47C07A; color:#8FEFBB; }
    .pic { background:rgba(200,115,20,.18); border-color:#D97E2A; color:#FFCA6F; }
    .pptb { flex:1; min-width:0; }
    .ppnl { font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.14em; color:var(--gold); opacity:.75; }
    .ppn  { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; color:var(--gold-pale); line-height:1.25; margin:1px 0 5px; }
    .ppzb { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:20px; font-size:.65rem; font-style:italic; }
    .zbh  { background:rgba(25,70,190,.2);  color:#9DC0FF; border:1px solid rgba(79,126,224,.35); }
    .zbm  { background:rgba(20,150,70,.2);  color:#8FEFBB; border:1px solid rgba(71,192,122,.35); }
    .zbc  { background:rgba(200,115,20,.2); color:#FFCA6F; border:1px solid rgba(217,126,42,.35); }
    .ppadr {
      display:flex; align-items:flex-start; gap:6px; margin:8px 0;
      font-size:.78rem; color:var(--parchment); opacity:.75;
    }
    .ppadr svg { width:12px; height:12px; flex-shrink:0; margin-top:2px; color:var(--gold); opacity:.7; }
    .ppdesc { font-size:.82rem; line-height:1.6; color:rgba(253,246,236,.82); margin:8px 0; }
    .pptags { display:flex; flex-wrap:wrap; gap:4px; margin:8px 0; }
    .pptag { background:rgba(200,146,10,.1); border:1px solid rgba(200,146,10,.2); color:var(--gold-light); font-size:.6rem; padding:2px 7px; border-radius:20px; font-style:italic; }
    .ppaw {
      background:rgba(200,146,10,.12); border:1px solid rgba(200,146,10,.3); border-radius:6px;
      padding:5px 9px; display:flex; align-items:center; gap:6px;
      font-size:.72rem; color:var(--gold-light); margin:8px 0;
    }
    .ppaw span:first-child { font-size:1rem; }
    .ppbtn {
      display:flex; align-items:center; justify-content:center; gap:7px;
      width:100%; margin-top:12px; padding:9px 14px;
      background:linear-gradient(135deg,var(--crimson) 0%,#560606 100%);
      border:1px solid var(--gold); border-radius:6px; color:var(--gold-light);
      font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.08em;
      text-decoration:none; cursor:pointer; transition:background .2s, transform .15s, box-shadow .2s;
    }
    .ppbtn:hover { background:linear-gradient(135deg,#8B1010 0%,#6A0808 100%); transform:translateY(-1px); box-shadow:0 4px 15px rgba(122,12,12,.5); }
    .ppbtn svg { width:14px; height:14px; }

    /* LEGEND */
    .legend {
      position:absolute; bottom:24px; right:12px; z-index:800;
      background:rgba(15,3,3,.88); border:1px solid rgba(200,146,10,.35);
      border-radius:8px; padding:10px 14px; backdrop-filter:blur(6px);
    }
    .lgt { font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.13em; color:var(--gold); margin-bottom:7px; text-transform:uppercase; }
    .lgr { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:.75rem; color:var(--parchment); }
    .lgd { width:11px; height:11px; border-radius:50%; flex-shrink:0; }

    /* MOBILE */
    .mob { display:none; position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:2000;
      background:linear-gradient(135deg,var(--crimson),#3A0404); color:var(--gold-light);
      border:1.5px solid var(--gold); border-radius:28px; padding:9px 22px;
      font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.1em; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,.55); }
    @media(max-width:680px){
      .sidebar { position:fixed; left:0; top:0; bottom:0; z-index:1500; transform:translateX(-100%); transition:transform .28s ease; width:min(340px,92vw); padding-top:58px; }
      .sidebar.open { transform:translateX(0); }
      .mob { display:block; }
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
  </style>
</head>
<body>

<header>
  <div class="hbrand">
    <div class="hcross">
      <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <rect x="15" y="3"  width="6" height="30" rx="1.5" fill="#C9920A"/>
        <rect x="3"  y="13" width="30" height="6"  rx="1.5" fill="#C9920A"/>
        <rect x="16" y="4"  width="4" height="28" rx="1"   fill="#E8B84B" opacity=".45"/>
        <rect x="4"  y="14" width="28" height="4"  rx="1"   fill="#E8B84B" opacity=".45"/>
      </svg>
    </div>
    <div class="htitle">
      <h1>Cruces de Mayo 2026</h1>
      <p>Mapa Interactivo · Córdoba</p>
    </div>
  </div>
  <div class="hinfo">
    <span class="city">Córdoba · Andalucía · España</span>
    <strong class="dates">29 abril – 3 mayo</strong>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sw">
      <span class="slbl">✦ Buscar Cruz</span>
      <div class="si">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="q" type="text" placeholder="Nombre, número, barrio…" autocomplete="off" />
      </div>
      <div class="filters">
        <button class="fb on" data-z="all">Todas</button>
        <button class="fb" data-z="h">Histórico</button>
        <button class="fb" data-z="m">Modernas</button>
        <button class="fb" data-z="c">Cerrados</button>
      </div>
      <div class="cnt" id="cnt">52 cruces</div>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <div id="map"></div>

  <div class="legend">
    <div class="lgt">Zonas</div>
    <div class="lgr"><div class="lgd" style="background:#4F7EE0"></div>Casco Histórico</div>
    <div class="lgr"><div class="lgd" style="background:#47C07A"></div>Zonas Modernas</div>
    <div class="lgr"><div class="lgd" style="background:#D97E2A"></div>Recintos Cerrados</div>
  </div>
</div>

<button class="mob" id="mob">☩ Ver Lista</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const Z = {
  h:{ label:'Casco Histórico',   pi:'pih', zb:'zbh', lc:'zh', color:'#4F7EE0' },
  m:{ label:'Zonas Modernas',    pi:'pim', zb:'zbm', lc:'zm', color:'#47C07A' },
  c:{ label:'Recintos Cerrados', pi:'pic', zb:'zbc', lc:'zc', color:'#D97E2A' }
};

const DATA = [

   tags:["Semana Santa","Plaza San Nicolás","Casco histórico"],award:null},

  {id:2,name:"Hdad. de la Sentencia",zone:"h",address:"Pl. San Felipe – San Nicolás, Córdoba",lat:37.8972,lng:-4.7786,

   tags:["Fundada 1944","Lunes Santo","J.M. Cerrillo"],award:"🏆 Premio especial del jurado (múltiples ediciones)"},

  {id:3,name:"Asoc. Amigos del Gazpacho",zone:"m",address:"C/ Doce de Octubre 3, Córdoba",lat:37.8936,lng:-4.7738,

   tags:["Asociación cultural","Gastronomía","Tradición popular"],award:null},

  {id:4,name:"Hermandad de los Dolores",zone:"h",address:"Pl. de Capuchinos, Córdoba",lat:37.8907,lng:-4.7752,
   desc:"Hermandad penitencial de gran arraigo en el barrio de Capuchinos. Su Cristo de la Clemencia es una de las imágenes más populares de Córdoba. La hermandad tiene el mayor número de hermanos de toda la Semana Santa cordobesa, lo que se refleja en la masiva participación de su cruz de mayo.",
   tags:["Más hermanos de Córdoba","Plaza Capuchinos","Viernes Santo"],award:"🏅 Accésit concurso (varias ediciones)"},

  {id:5,name:"Hermandad de la Paz",zone:"h",address:"Cuesta del Bailío, Córdoba",lat:37.8885,lng:-4.7717,
   desc:"Una de las cruces más fotografiadas del festival. Se instala en la mítica Cuesta del Bailío, con sus casas encaladas de incomparable belleza. Fundada en 1940 y símbolo de reconciliación tras la Guerra Civil, su Virgen de la Paz y Esperanza es Patrimonio Emocional de la ciudad.",
   tags:["Fundada 1940","Cuesta del Bailío","Símbolo de paz"],award:"🥈 2.º Premio Casco Histórico (varias ediciones)"},

  {id:6,name:"Hdad. Padre Jesús de la Sangre",zone:"h",address:"Pl. del Cardenal Toledo, Córdoba",lat:37.8866,lng:-4.7738,

   tags:["Jueves Santo","Arte floral","Centro histórico"],award:null},

  {id:7,name:"Hermandad de la Santa Faz",zone:"h",address:"Pl. de la Compañía, Córdoba",lat:37.8858,lng:-4.7778,

  {id:8,name:"Hermandad del Huerto",zone:"h",address:"Zona C/ Encarnación – Heredia, Córdoba",lat:37.8832,lng:-4.7790,

  {id:9,name:"Peña Amigos de Lorena y Manolín",zone:"h",address:"Zona Pl. del Potro, Córdoba",lat:37.8805,lng:-4.7728,

   tags:["Peña cultural","Sevillanas","Ambiente festivo"],award:null},

  {id:10,name:"Hdad. Jesús del Calvario",zone:"h",address:"Pl. de Abades, Córdoba",lat:37.8820,lng:-4.7773,

  {id:11,name:"Hdad. del Socorro",zone:"h",address:"Pl. del Socorro, Córdoba",lat:37.8818,lng:-4.7755,

  {id:14,name:"Casa de Sevilla",zone:"c",address:"Ronda de Andújar 17, Córdoba",lat:37.8768,lng:-4.7622,

  {id:15,name:"Colegio Agentes Comerciales",zone:"c",address:"Zona norte Córdoba (C/ Dolores Ibarruri)",lat:37.8965,lng:-4.7793,

/* ─── MAP ─── */
const map = L.map('map',{center:[37.8880,-4.7797],zoom:14,zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

/* ─── ICON ─── */
function mkIcon(d){
  const c=Z[d.zone].color;
  return L.divIcon({
    html:`<svg width="38" height="50" viewBox="0 0 38 50" xmlns="http://www.w3.org/2000/svg">
      <defs><filter id="s${d.id}"><feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="rgba(0,0,0,.65)"/></filter></defs>
      <path d="M19 48C19 48 3 31 3 18.5A16 16 0 0 1 35 18.5C35 31 19 48 19 48Z" fill="${c}" opacity=".92" filter="url(#s${d.id})"/>
      <path d="M19 48C19 48 3 31 3 18.5A16 16 0 0 1 35 18.5C35 31 19 48 19 48Z" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
      <rect x="17.2" y="10" width="3.6" height="13" rx="1" fill="rgba(255,255,255,.95)"/>
      <rect x="11.5" y="14.5" width="15" height="3.6" rx="1" fill="rgba(255,255,255,.95)"/>
      <text x="19" y="33" font-family="Cinzel,serif" font-size="7" fill="white" text-anchor="middle" font-weight="700">${d.id}</text>
    </svg>`,
    iconSize:[38,50],iconAnchor:[19,48],popupAnchor:[0,-50],className:''
  });
}

/* ─── POPUP ─── */
function mkPop(d){
  const z=Z[d.zone];
  const mapsUrl=`https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}&travelmode=walking`;
  return `<div class="pp">
    <div class="pph">
      <div class="ppi ${z.pi}">${d.id}</div>
      <div class="pptb">
        <div class="ppnl">CRUZ N.º ${d.id} · ${d.zone==='h'?'HISTÓRICO':d.zone==='m'?'MODERNAS':'CERRADO'}</div>
        <div class="ppn">${d.name}</div>
        <span class="ppzb ${z.zb}">✦ ${z.label}</span>
      </div>
    </div>
    <div class="ppadr">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>${d.address}</span>
    </div>
    <div class="ppdesc">${d.desc}</div>
    ${d.award?`<div class="ppaw"><span>🏆</span><span>${d.award}</span></div>`:''}
    <div class="pptags">${d.tags.map(t=>`<span class="pptag">${t}</span>`).join('')}</div>
    <a class="ppbtn" href="${mapsUrl}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Cómo llegar — Google Maps
    </a>
  </div>`;
}

/* ─── MARKERS ─── */
const markers={};
let activeZ='all';
DATA.forEach(d=>{
  const m=L.marker([d.lat,d.lng],{icon:mkIcon(d)}).addTo(map);
  m.bindPopup(mkPop(d),{maxWidth:305});
  m.on('click',()=>hilite(d.id));
  markers[d.id]=m;
});

/* ─── SIDEBAR ─── */
const listEl=document.getElementById('list');
const cntEl=document.getElementById('cnt');

DATA.forEach((d,i)=>{
  const li=document.createElement('div');
  li.className=`item ${Z[d.zone].lc}`;
  li.dataset.id=d.id;
  li.style.animationDelay=`${i*10}ms`;
  li.innerHTML=`<div class="num">${d.id}</div><div style="flex:1;min-width:0"><div class="iname">${d.name}</div><div class="itag">${Z[d.zone].label}</div></div>`;
  li.addEventListener('click',()=>{
    flyTo(d); hilite(d.id);
    if(window.innerWidth<=680) closeSidebar();
  });
  listEl.appendChild(li);
});

function hilite(id){
  document.querySelectorAll('.item').forEach(el=>el.classList.remove('active'));
  const el=listEl.querySelector(`[data-id="${id}"]`);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function flyTo(d){
  map.flyTo([d.lat,d.lng],17,{duration:.9});
  setTimeout(()=>markers[d.id].openPopup(),950);
}

/* ─── SEARCH & FILTER ─── */
const qEl=document.getElementById('q');
function refresh(){
  const q=qEl.value.toLowerCase().trim();
  let vis=0;
  DATA.forEach(d=>{
    const el=listEl.querySelector(`[data-id="${d.id}"]`);
    const okZ=activeZ==='all'||d.zone===activeZ;
    const okQ=!q||d.name.toLowerCase().includes(q)||String(d.id).includes(q)||d.address.toLowerCase().includes(q)||d.tags.some(t=>t.toLowerCase().includes(q));
    const show=okZ&&okQ;
    el.classList.toggle('gone',!show);
    show?(map.hasLayer(markers[d.id])||markers[d.id].addTo(map)):(map.hasLayer(markers[d.id])&&map.removeLayer(markers[d.id]));
    if(show)vis++;
  });
  cntEl.textContent=`${vis} cruz${vis!==1?'es':''}`;
}
qEl.addEventListener('input',refresh);
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    activeZ=b.dataset.z;
    refresh();
  });
});

/* ─── CITY CROSS ─── */
L.marker([37.8884,-4.7797],{icon:L.divIcon({
  html:`<div style="background:rgba(181,38,31,.92);border:1.5px solid #C9920A;border-radius:4px;padding:3px 8px;font-family:Cinzel,serif;font-size:8px;color:#E8B84B;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.65);letter-spacing:.08em">✝ CRUZ DE LA CIUDAD</div>`,
  iconAnchor:[65,12],className:''
})}).addTo(map);

/* ─── MOBILE ─── */
const sidebar=document.getElementById('sidebar'),mobBtn=document.getElementById('mob');
mobBtn.addEventListener('click',()=>{
  sidebar.classList.toggle('open');
  mobBtn.textContent=sidebar.classList.contains('open')?'✕ Cerrar':'☩ Ver Lista';
});
function closeSidebar(){sidebar.classList.remove('open');mobBtn.textContent='☩ Ver Lista';}
map.on('click',()=>{if(window.innerWidth<=680)closeSidebar();});
</script>
</body>
